<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" width="1600" height="840">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080a"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c6ef5"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="840" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="140" x2="1600" y2="140"/>
    <line x1="0" y1="280" x2="1600" y2="280"/>
    <line x1="0" y1="420" x2="1600" y2="420"/>
    <line x1="0" y1="560" x2="1600" y2="560"/>
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="266" y1="0" x2="266" y2="840"/>
    <line x1="533" y1="0" x2="533" y2="840"/>
    <line x1="800" y1="0" x2="800" y2="840"/>
    <line x1="1066" y1="0" x2="1066" y2="840"/>
    <line x1="1333" y1="0" x2="1333" y2="840"/>
  </g>

  <!-- Glow orb top-right -->
  <ellipse cx="1300" cy="180" rx="320" ry="220" fill="#7c6ef5" fill-opacity="0.07"/>
  <!-- Glow orb bottom-left -->
  <ellipse cx="280" cy="680" rx="260" ry="180" fill="#a78bfa" fill-opacity="0.06"/>

  <!-- Center glow -->
  <ellipse cx="800" cy="420" rx="500" ry="300" fill="#7c6ef5" fill-opacity="0.04"/>

  <!-- Code snippet — left panel -->
  <rect x="140" y="260" width="480" height="320" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>
  <!-- window dots -->
  <circle cx="170" cy="290" r="6" fill="#f87171" opacity="0.7"/>
  <circle cx="192" cy="290" r="6" fill="#fbbf24" opacity="0.7"/>
  <circle cx="214" cy="290" r="6" fill="#86efac" opacity="0.7"/>
  <line x1="140" y1="308" x2="620" y2="308" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <text x="164" y="340" font-family="'SF Mono','Fira Code',monospace" font-size="15" fill="#7c6ef5" opacity="0.8">// no backend needed</text>
  <text x="164" y="368" font-family="'SF Mono','Fira Code',monospace" font-size="15" fill="#ffffff" opacity="0.55">const db = <tspan fill="#a78bfa">googleSheet</tspan>()</text>
  <text x="164" y="396" font-family="'SF Mono','Fira Code',monospace" font-size="15" fill="#ffffff" opacity="0.55">const scope = <tspan fill="#86efac">'drive.file'</tspan></text>
  <text x="164" y="424" font-family="'SF Mono','Fira Code',monospace" font-size="15" fill="#ffffff" opacity="0.55">const server = <tspan fill="#f87171">null</tspan></text>
  <text x="164" y="452" font-family="'SF Mono','Fira Code',monospace" font-size="15" fill="#ffffff" opacity="0.55">const privacy = <tspan fill="#86efac">true</tspan></text>
  <text x="164" y="480" font-family="'SF Mono','Fira Code',monospace" font-size="15" fill="#7c6ef5" opacity="0.8">// your data, your drive</text>
  <text x="164" y="532" font-family="'SF Mono','Fira Code',monospace" font-size="15" fill="#ffffff" opacity="0.3">export default <tspan fill="#a78bfa">App</tspan></text>

  <!-- Right panel — author + name -->
  <rect x="980" y="260" width="480" height="320" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>
  <circle cx="800" cy="420" r="1" fill="none"/> <!-- spacer -->

  <!-- Avatar placeholder — initials -->
  <circle cx="1220" cy="340" r="52" fill="#7c6ef5" fill-opacity="0.15" stroke="#7c6ef5" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="1220" y="352" font-family="'SF Mono','Fira Code',monospace" font-size="28" font-weight="700" fill="#a78bfa" text-anchor="middle" opacity="0.9">DP</text>

  <text x="1220" y="428" font-family="'SF Mono','Fira Code',monospace" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1" opacity="0.9">Deepak Prasad</text>
  <text x="1220" y="458" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#7c6ef5" text-anchor="middle" letter-spacing="1" opacity="0.7">Software Engineer</text>

  <line x1="1100" y1="490" x2="1340" y2="490" stroke="#7c6ef5" stroke-opacity="0.2" stroke-width="1"/>

  <text x="1220" y="520" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.3" letter-spacing="2">beingdpkpr.github.io/deepak-prasad</text>

  <!-- Connector line between panels -->
  <line x1="620" y1="420" x2="980" y2="420" stroke="#7c6ef5" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="6 4"/>
  <circle cx="800" cy="420" r="4" fill="#7c6ef5" opacity="0.3"/>
  <circle cx="800" cy="420" r="8" fill="none" stroke="#7c6ef5" stroke-opacity="0.2" stroke-width="1"/>
</svg>
